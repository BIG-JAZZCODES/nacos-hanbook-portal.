<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
<head>
    <style>
        body {
            background-image: url('images/computerpick.png');
            background-size: cover;
            background-position: center;
            height: 20vh;
            margin: 0;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }
        .navbar {
            background-color: green;
            color: rgb(196, 191, 191);
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }
        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #222;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: green;
        }
        .main {
            margin-left: 200px;
            padding: 20px;
        }
        .card {
            background-color: white;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .main {
            margin-left: 200px;
            padding: 20px;
            overflow: hidden;
        }
        .marquee {
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee {
            display: inline-block;
            animation: scrollText 10s linear infinite;
        }
        @keyframes scrollText {
            0%{
                transform: translateX(-100%);
            }
            100% {
                transform: translate(100%);
            }
        }
        .color {
            color: white;
        }
    </style>
<body>

    <div class="navbar">
        NACOS Dashboard
    </div>
    <div class="sidebar">
        <a href="hom.html">Home</a>
        <a href="levelcours.html">Level Courses</a>
        <a href="courselecturers.html">Course Lecturers</a>
    </div>
    <div class="main">
      <div class="marquee">
        <h2><p class="color"><em> Welcome To NACOS Student Hanbook Portal<em>&#128075;</h2>
        <div>

    
</body>
</html>
